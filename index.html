<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4caf50">  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body> <div id="lockScreen">
 <nav class="tabs">

  <button onclick="showPage('home')">🏠 Home</button>
  <button onclick="showPage('history')">📊 History</button>
  <button onclick="showPage('goals')">🎯 Goals</button>
  <button onclick="showPage('settings')">⚙️ Settings</button>

</nav> <h1>🔒 Expense Tracker</h1>
  <p>Enter PIN</p>
  <input id="unlockPin" type="password" placeholder="PIN">
  <button id="unlockBtn">Unlock</button>
  <p id="lockMessage"></p>
</div>

<div class="app">

  <header>
    <h1>💰 Expense Tracker</h1>
    <button id="darkModeBtn">🌙</button>
  </header>

  <section id="home" class="summary">
    <section class="receipt-box">

  <h2>📸 Receipt Scanner</h2>

  <input 
    type="file" 
    id="receiptImage" 
    accept="image/*" 
    capture="environment">

  <input id="receiptName" placeholder="Receipt name">
<button id="scanReceipt">
🔍 Scan Receipt
</button>

<p id="scanStatus"></p>
  <input id="receiptAmount" type="number" placeholder="Amount">

  <button id="addReceipt">
    Add Receipt Expense
  </button>

  <img id="receiptPreview">

</section><div id="alertBox"></div><div class="card">
      <h3>Total Spent</h3>
      <p id="total">$0.00</p>
    </div>

    <div class="card">
      <h3>Budget</h3>
      <p id="budget">$0.00</p>
    </div>

    <div class="card">
      <h3>Remaining</h3>
      <p id="remaining">$0.00</p>
    </div>
  </section>


  <section class="add-box">

    <h2>Add Expense</h2>

    <input id="expenseName" placeholder="Expense name">

    <input id="expenseAmount" type="number" placeholder="Amount">

    <select id="category">
      <option>Food</option>
      <option>Games</option>
      <option>Shopping</option>
      <option>Transport</option>
      <option>Other</option>
    </select>

    <button id="addBtn">Add Expense</button>

  </section>


  <section class="budget-box">

    <h2>Set Budget</h2>

    <input id="budgetInput" type="number" placeholder="Monthly budget">

    <button id="saveBudget">Save Budget</button>

  </section>


  <section>

    <input id="search" placeholder="🔍 Search expenses">

    <h2>Expenses</h2>

    <ul id="expenseList"></ul>

  </section>


  <section class="chart-box">

    <h2>Spending</h2>

    <canvas id="chart"></canvas>

  </section>


</div>
<button id="installBtn" style="display:none;">
📲 Install App
</button>
<button id="exportBtn">📤 Export Data</button>

<button id="reportBtn">📅 Monthly Report</button>

<div id="pinBox">
  <h2>🔒 App PIN</h2>
  <input id="pinInput" placeholder="Create PIN">
  <button id="savePin">Save PIN</button>
</div><section id="history" class="history-box">

  <h2>📅 Spending History</h2>

  <select id="monthSelect">
    <option value="0">January</option>
    <option value="1">February</option>
    <option value="2">March</option>
    <option value="3">April</option>
    <option value="4">May</option>
    <option value="5">June</option>
    <option value="6">July</option>
    <option value="7">August</option>
    <option value="8">September</option>
    <option value="9">October</option>
    <option value="10">November</option>
    <option value="11">December</option>
  </select>

  <div id="historyResult">
    Select a month
  </div>
<section id="settings" class="settings-box">

  <h2>🎯 Savings Goal</h2>

  <input id="goalName" placeholder="Goal name">

  <input id="goalAmount" type="number" placeholder="Goal amount">

  <input id="savedAmount" type="number" placeholder="Amount saved">

  <button id="saveGoal">Save Goal</button>

  <div id="goalDisplay"></div>
<section class="settings-box">

  <h2>⚙️ Settings</h2>
<button id="resetPin">
🔓 Reset PIN (Test)
</button><button id="lockApp">
🔒 Lock App
</button>

<button id="changePin">
🔑 Change PIN
</button>
  <label>
    Theme:
  </label>

  <select id="themeSelect">
    <option value="green">Green</option>
    <option value="blue">Blue</option>
    <option value="purple">Purple</option>
  </select>


  <button id="resetBtn">
    🗑 Reset All Data
  </button>


  <p>
    Expense Tracker Pro v1.0
  </p>

</section>
</section>
</section> <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
